          c: 0,
        },
        {

            "แถบฝ้าสีขาวจางพาดบนท้องฟ้า",
            "วงแหวนสีแดงรอบโลก",

          ],

        },

        {

          c: 1,
        },
        {
          q: "ระบบสุริยะเกิดขึ้นเมื่อประมาณเท่าใด?",
          a: ["13,800 ล้านปี", "4,600 ล้านปี", "500 ล้านปี", "10,000 ปี"],
          c: 1,
        },
        {
          q: "ดาวเคราะห์ในระบบสุริยะมีทั้งหมดกี่ดวง?",
          a: ["7 ดวง", "8 ดวง", "9 ดวง", "10 ดวง"],
          c: 1,
        },
        {
          q: "ข้อใดเป็นสมาชิกของระบบสุริยะ?",
          a: ["ดาวหาง", "กาแล็กซีอื่น", "เนบิวลาทุกแห่ง", "กระจุกกาแล็กซี"],
          c: 0,
        },

        {
          q: "ดาวเคราะห์ดวงใดอยู่ใกล้ดวงอาทิตย์มากที่สุด?",

        {

          c: 1,
        },
        {
          q: "ดาวเคราะห์สีแดงคือข้อใด?",

          c: 1,
        },
        {
          q: "โลกเป็นดาวเคราะห์ลำดับที่เท่าใดจากดวงอาทิตย์?",
          a: ["ลำดับที่ 2", "ลำดับที่ 3", "ลำดับที่ 4", "ลำดับที่ 5"],
          c: 1,
        },

        {
          q: "ดาวเคราะห์ดวงใดมีวงแหวนเด่นชัดที่สุด?",
          a: ["ดาวเสาร์", "ดาวอังคาร", "โลก", "ดาวพุธ"],
          c: 0,
        },
        {
          q: "ข้อใดเป็นดาวเคราะห์ชั้นใน?",
          a: ["โลก", "ดาวพฤหัสบดี", "ดาวเสาร์", "ดาวเนปจูน"],
          c: 0,
        },
        {
          q: "ข้อใดเป็นดาวเคราะห์ชั้นนอก?",
          a: ["ดาวศุกร์", "ดาวอังคาร", "ดาวพฤหัสบดี", "โลก"],
          c: 2,
        },
        {
          q: "ดาวเคราะห์ชั้นนอกส่วนใหญ่มีลักษณะอย่างไร?",
          a: [
            "เป็นดาวเคราะห์แก๊สหรือยักษ์น้ำแข็ง",
            "เป็นดาวเคราะห์หินทั้งหมด",
            "ไม่มีดวงจันทร์",
            "ไม่มีแรงโน้มถ่วง",
          ],
          c: 0,
        },

        {
          q: "ดวงอาทิตย์จัดเป็นวัตถุประเภทใด?",
          a: ["ดาวเคราะห์", "ดาวฤกษ์", "ดาวเคราะห์แคระ", "เนบิวลา"],
          c: 1,
        },
        {
          q: "ดาวฤกษ์แตกต่างจากดาวเคราะห์อย่างไร?",
          a: [
            "ดาวฤกษ์เปล่งพลังงานได้เอง",
            "ดาวฤกษ์ไม่มีมวล",
            "ดาวฤกษ์ไม่มีแรงโน้มถ่วง",
            "ดาวฤกษ์โคจรรอบโลก",
          ],
          c: 0,
        },
        {
          q: "พลังงานของดาวฤกษ์เกิดจากกระบวนการใด?",
          a: [
            "นิวเคลียร์ฟิวชัน",
            "การเผาไหม้ถ่านหิน",
            "การสะท้อนแสง",
            "แรงเสียดทาน",
          ],
          c: 0,
        },
        {
          q: "สีของดาวฤกษ์สัมพันธ์กับสิ่งใดมากที่สุด?",
          a: [
            "อุณหภูมิผิว",
            "จำนวนดวงจันทร์",
            "ขนาดของวงโคจร",
            "ระยะห่างจากโลก",
          ],
          c: 0,
        },

        {
          q: "เนบิวลาคืออะไร?",
          a: [
            "กลุ่มก๊าซและฝุ่นในอวกาศ",
            "ดาวเคราะห์เกิดใหม่",
            "หลุมดำขนาดเล็ก",
            "ชั้นบรรยากาศโลก",
          ],
          c: 0,
        },
        {
          q: "เนบิวลามีความสำคัญอย่างไร?",
          a: [
            "เป็นแหล่งกำเนิดดาวฤกษ์",
            "เป็นศูนย์กลางทุกกาแล็กซี",
            "เป็นแหล่งกำเนิดมหาสมุทร",
            "เป็นต้นกำเนิดแรงโน้มถ่วงโลก",
          ],
          c: 0,
        },
        {
          q: "โปรโตสตาร์หมายถึงข้อใด?",
          a: [
            "ดาวฤกษ์ก่อนเข้าสู่ระยะสมบูรณ์",
            "ดาวฤกษ์ที่ดับแล้ว",
            "ดาวเคราะห์แคระ",
            "ดาวคู่",
          ],
          c: 0,
        },
        {
          q: "ดวงอาทิตย์อยู่ในช่วงใดของวงจรชีวิตดาวฤกษ์?",
          a: ["ดาวฤกษ์ลำดับหลัก", "ดาวยักษ์แดง", "ดาวแคระขาว", "ซูเปอร์โนวา"],
          c: 0,
        },

        {
          q: "หลุมดำคืออะไร?",
          a: [
            "วัตถุที่มีแรงโน้มถ่วงสูงมาก",
            "โพรงอากาศในอวกาศ",
            "ดาวเคราะห์ที่ไร้แสง",
            "กลุ่มฝุ่นเย็น",
          ],
          c: 0,
        },
        {
          q: "บริเวณรอบหลุมดำที่แม้แสงก็หลุดออกมาไม่ได้เรียกว่าอะไร?",
          a: ["ขอบฟ้าเหตุการณ์", "ชั้นโอโซน", "เขตวงแหวน", "แกนกาแล็กซี"],
          c: 0,
        },
        {
          q: "หลุมดำจำนวนมากเกิดจากเหตุการณ์ใด?",
          a: [
            "ดาวฤกษ์มวลมากยุบตัว",
            "ดาวหางละลาย",
            "โลกชนดวงจันทร์",
            "เนบิวลาหายไป",
          ],
          c: 0,
        },
        {
          q: "นักวิทยาศาสตร์มักศึกษาหลุมดำจากสิ่งใด?",
          a: [
            "ผลกระทบต่อวัตถุรอบข้าง",
            "การมองเห็นพื้นผิวโดยตรง",
            "เสียงระเบิด",
            "สีของพื้นผิว",
          ],
          c: 0,
        },

        {
          q: "ข้อใดเป็นประโยชน์สำคัญของดาวเทียม?",
          a: [
            "การสื่อสารและพยากรณ์อากาศ",
            "เพิ่มออกซิเจนให้โลก",
            "สร้างภูเขาไฟ",
            "เพิ่มแรงโน้มถ่วงโลก",
          ],
          c: 0,
        },
        {
          q: "พาหนะที่ใช้ส่งวัตถุสู่อวกาศคืออะไร?",
          a: ["จรวด", "เรือดำน้ำ", "รถไฟ", "บอลลูนอากาศร้อน"],
          c: 0,
        },
        {
          q: "ISS ย่อมาจากข้อใด?",
          a: [
            "สถานีอวกาศนานาชาติ",
            "ระบบดาวเทียมสากล",
            "ศูนย์สำรวจสุริยะ",
            "ยานอวกาศอัจฉริยะ",
          ],
          c: 0,
        },
        {
          q: "นักบินอวกาศคือบุคคลประเภทใด?",
          a: [
            "ผู้ได้รับการฝึกเพื่อปฏิบัติงานในอวกาศ",
            "ผู้ควบคุมสภาพอากาศ",
            "ผู้สร้างดาวเทียมเท่านั้น",
            "ผู้ศึกษาแร่ใต้ดิน",
          ],
          c: 0,
        },
      ];

      let current = 0;
      let userAns = new Array(quiz.length).fill(null);

      function render() {
        const app = document.getElementById("app");

        if (current === quiz.length) {
          let score = 0;
          for (let i = 0; i < quiz.length; i++) {
            if (userAns[i] === quiz[i].c) score++;
          }

          app.innerHTML = `
<div class="result">
<h1>✨ เสร็จแล้ว ✨</h1>
คะแนน ${score} / ${quiz.length}<br>
${
  score <= 10
    ? "เริ่มต้นได้ดี ยังไปต่อได้อีก 🚀"
    : score <= 20
      ? "มาถูกทางแล้ว พยายามต่อนะ 🌟"
      : score <= 30
        ? "เก่งมาก ความรู้แน่นขึ้นแล้ว 🔥"
        : "สุดยอดมาก ทำได้ดีเยี่ยม 👑"
}<br><br>
<a href="course.html" style="color:#8ea2ff">กลับไปเรียน</a>
</div>
`;
          return;
        }

        const item = quiz[current];

        app.innerHTML = `
<h1>Starry Quiz</h1>
<div class="progress">ข้อ ${current + 1} / ${quiz.length}</div>
<div class="question">${item.q}</div>

<div class="answers">
${item.a
  .map(
    (choice, i) =>
      `<button class="${userAns[current] === i ? "selected" : ""}"
onclick="selectAns(${i})">${choice}</button>`,
  )
  .join("")}
</div>

<div class="nav">
<button onclick="prevQ()">ย้อนกลับ</button>
<button onclick="nextQ()">ถัดไป</button>
</div>
`;
      }

      function selectAns(i) {
        userAns[current] = i;
        render();
      }

      function nextQ() {
        current++;
        render();
      }

      function prevQ() {
        if (current > 0) current--;
        render();
      }

      render();
    </script>
  </body>
</html>
