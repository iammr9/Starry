<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - ระบบสุริยะ</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/solar.png" />
        </div>

        <h1 id="title">ระบบสุริยะคืออะไร</h1>

        <p id="desc">
          ระบบสุริยะ คือ ระบบดาวที่มีดวงอาทิตย์เป็นศูนย์กลาง และมีวัตถุต่าง ๆ
          โคจรรอบอยู่ภายใต้แรงโน้มถ่วง เช่น ดาวเคราะห์ 8 ดวง ดวงจันทร์
          ดาวเคราะห์แคระ ดาวเคราะห์น้อย ดาวหาง และสะเก็ดดาว
          ระบบสุริยะเป็นเพียงส่วนเล็ก ๆ ส่วนหนึ่งของกาแล็กซีทางช้างเผือก
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "ระบบสุริยะคืออะไร",
          img: "../assets/solar.png",
          desc: "ระบบสุริยะ คือ ระบบดาวที่มีดวงอาทิตย์เป็นศูนย์กลาง และมีวัตถุต่าง ๆ โคจรรอบอยู่ภายใต้แรงโน้มถ่วง เช่น ดาวเคราะห์ 8 ดวง ดวงจันทร์ ดาวเคราะห์แคระ ดาวเคราะห์น้อย ดาวหาง และสะเก็ดดาว ระบบสุริยะเป็นเพียงส่วนเล็ก ๆ ส่วนหนึ่งของกาแล็กซีทางช้างเผือก",
        },
        {
          title: "กำเนิดระบบสุริยะ",
          img: "../assets/solar.png",
          desc: "นักวิทยาศาสตร์เชื่อว่าระบบสุริยะเกิดขึ้นเมื่อประมาณ 4,600 ล้านปีก่อน จากกลุ่มก๊าซและฝุ่นขนาดใหญ่ที่ยุบตัวลงด้วยแรงโน้มถ่วง ส่วนกลางกลายเป็นดวงอาทิตย์ ส่วนที่เหลือรวมตัวกันเป็นดาวเคราะห์ ดวงจันทร์ และวัตถุอื่น ๆ",
        },
        {
          title: "การแบ่งกลุ่มดาวเคราะห์",
          img: "../assets/solar.png",
          desc: "ดาวเคราะห์ในระบบสุริยะแบ่งได้ 2 กลุ่มใหญ่ คือ ดาวเคราะห์หิน ได้แก่ พุธ ศุกร์ โลก และอังคาร ซึ่งมีพื้นผิวแข็ง และดาวเคราะห์แก๊สหรือยักษ์น้ำแข็ง ได้แก่ พฤหัสบดี เสาร์ ยูเรนัส และเนปจูน",
        },
        {
          title: "ดวงอาทิตย์ ศูนย์กลางของระบบ",
          img: "../assets/sun.png",
          desc: "ดวงอาทิตย์เป็นดาวฤกษ์ที่มีมวลมากที่สุดในระบบสุริยะ คิดเป็นมากกว่า 99% ของมวลทั้งหมด ให้แสงสว่างและพลังงานความร้อนแก่ดาวเคราะห์ทุกดวง พลังงานของดวงอาทิตย์เกิดจากปฏิกิริยานิวเคลียร์ฟิวชันภายในแกนกลาง",
        },
        {
          title: "ดาวพุธ",
          img: "../assets/mercury.png",
          desc: "ดาวพุธเป็นดาวเคราะห์ที่อยู่ใกล้ดวงอาทิตย์ที่สุด และมีขนาดเล็กที่สุดในระบบสุริยะ พื้นผิวเต็มไปด้วยหลุมอุกกาบาต อุณหภูมิกลางวันร้อนจัด แต่กลางคืนหนาวมาก เพราะแทบไม่มีชั้นบรรยากาศ",
        },
        {
          title: "ดาวศุกร์",
          img: "../assets/venus.png",
          desc: "ดาวศุกร์มีขนาดใกล้เคียงโลกมาก จึงถูกเรียกว่าแฝดของโลก แต่มีชั้นบรรยากาศหนาแน่นเต็มไปด้วยก๊าซคาร์บอนไดออกไซด์ ทำให้เกิดภาวะเรือนกระจกอย่างรุนแรง เป็นดาวเคราะห์ที่ร้อนที่สุดในระบบสุริยะ",
        },
        {
          title: "โลก",
          img: "../assets/earth.png",
          desc: "โลกเป็นดาวเคราะห์ดวงเดียวที่ทราบแน่ชัดว่ามีสิ่งมีชีวิต มีน้ำในสถานะของเหลวจำนวนมาก มีชั้นบรรยากาศที่เหมาะสมต่อการดำรงชีวิต และมีดวงจันทร์บริวาร 1 ดวง",
        },
        {
          title: "ดาวอังคาร",
          img: "../assets/mars.png",
          desc: "ดาวอังคารมีสีแดงจากสนิมเหล็กบนพื้นผิว มีภูเขาไฟขนาดใหญ่และหุบเขายาวมหาศาล เชื่อว่าอดีตเคยมีน้ำไหลบนพื้นผิว จึงเป็นดาวเคราะห์ที่มนุษย์สนใจสำรวจมากที่สุดดวงหนึ่ง",
        },
        {
          title: "ดาวพฤหัสบดี",
          img: "../assets/jupiter.png",
          desc: "ดาวพฤหัสบดีเป็นดาวเคราะห์ที่ใหญ่ที่สุดในระบบสุริยะ เป็นดาวแก๊สยักษ์ มีพายุขนาดมหึมาที่เรียกว่า จุดแดงใหญ่ และมีดวงจันทร์บริวารจำนวนมาก",
        },
        {
          title: "ดาวเสาร์",
          img: "../assets/saturn.png",
          desc: "ดาวเสาร์มีชื่อเสียงจากวงแหวนขนาดใหญ่สวยงาม ซึ่งประกอบด้วยน้ำแข็ง ฝุ่น และเศษหิน เป็นดาวแก๊สยักษ์ที่มีความหนาแน่นต่ำมาก และมีดวงจันทร์หลายดวง",
        },
        {
          title: "ดาวยูเรนัส",
          img: "../assets/uranus.png",
          desc: "ดาวยูเรนัสเป็นยักษ์น้ำแข็ง มีสีฟ้าอมเขียวจากก๊าซมีเทน จุดเด่นคือแกนหมุนเอียงมากจนเหมือนหมุนตะแคงไปด้านข้าง",
        },
        {
          title: "ดาวเนปจูน",
          img: "../assets/neptune.png",
          desc: "ดาวเนปจูนเป็นดาวเคราะห์ที่อยู่ไกลจากดวงอาทิตย์ที่สุด มีสีน้ำเงินเข้ม และมีลมพายุรุนแรงมาก เป็นหนึ่งในดาวยักษ์น้ำแข็งของระบบสุริยะ",
        },
        {
          title: "วัตถุอื่นในระบบสุริยะ",
          img: "../assets/solar5.png",
          desc: "นอกจากดาวเคราะห์ ยังมีดาวเคราะห์แคระ เช่น พลูโต แถบดาวเคราะห์น้อยระหว่างดาวอังคารกับดาวพฤหัสบดี ดาวหางที่มีหางยาวเมื่อเข้าใกล้ดวงอาทิตย์ และอุกกาบาตขนาดต่าง ๆ",
        },
        {
          title: "ความสำคัญของระบบสุริยะ",
          img: "../assets/solar5.png",
          desc: "การศึกษาระบบสุริยะช่วยให้มนุษย์เข้าใจการกำเนิดดาวเคราะห์ ต้นกำเนิดโลก ความเป็นไปได้ของสิ่งมีชีวิตบนดาวอื่น และเป็นพื้นฐานสำคัญของการสำรวจอวกาศในอนาคต",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
