<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - ทฤษฎีการกำเนิดเอกภพ</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/bigbang.jpg" />
        </div>

        <h1 id="title">ทฤษฎีการกำเนิดเอกภพ</h1>

        <p id="desc">
          นักวิทยาศาสตร์เชื่อว่าเอกภพไม่ได้มีอยู่ตลอดไป แต่มีจุดเริ่มต้น
          ทฤษฎีที่ได้รับการยอมรับมากที่สุดในปัจจุบันคือ ทฤษฎีบิกแบง (Big Bang
          Theory) ซึ่งอธิบายว่าเอกภพเริ่มจากสภาวะที่เล็กมาก หนาแน่นสูงมาก
          และร้อนจัด ก่อนจะขยายตัวจนเกิดเป็นเอกภพขนาดมหาศาลในปัจจุบัน
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "ทฤษฎีการกำเนิดเอกภพ",
          img: "../assets/bigbang.jpg",
          desc: "นักวิทยาศาสตร์เชื่อว่าเอกภพไม่ได้มีอยู่ตลอดไป แต่มีจุดเริ่มต้น ทฤษฎีที่ได้รับการยอมรับมากที่สุดในปัจจุบันคือ ทฤษฎีบิกแบง (Big Bang Theory) ซึ่งอธิบายว่าเอกภพเริ่มจากสภาวะที่เล็กมาก หนาแน่นสูงมาก และร้อนจัด ก่อนจะขยายตัวจนเกิดเป็นเอกภพขนาดมหาศาลในปัจจุบัน",
        },
        {
          title: "ก่อนเกิดบิกแบง",
          img: "../assets/bigbang2.jpg",
          desc: "ในทางวิทยาศาสตร์ยังไม่สามารถอธิบายได้ชัดเจนว่า ก่อนการเกิดบิกแบงมีอะไรอยู่ หรือเวลาและอวกาศมีลักษณะอย่างไร เพราะกฎฟิสิกส์ที่เรารู้จักอาจยังใช้ไม่ได้ในช่วงเวลานั้น จึงยังเป็นเรื่องที่นักวิทยาศาสตร์ศึกษาต่อไป",
        },
        {
          title: "ช่วงเวลาแรกเริ่ม",
          img: "../assets/bigbang2.jpg",
          desc: "หลังการเกิดบิกแบงเพียงเสี้ยววินาทีแรก เอกภพร้อนจัดและเต็มไปด้วยพลังงานมหาศาล มีการขยายตัวอย่างรวดเร็วมาก เรียกว่า Inflation ทำให้เอกภพมีขนาดใหญ่ขึ้นอย่างมหาศาลในเวลาอันสั้น",
        },
        {
          title: "การเกิดอนุภาคพื้นฐาน",
          img: "../assets/bigbang2.jpg",
          desc: "เมื่อเอกภพเริ่มเย็นตัวลง พลังงานจำนวนมากเปลี่ยนเป็นอนุภาคพื้นฐาน เช่น ควาร์ก อิเล็กตรอน และอนุภาคอื่น ๆ ต่อมาควาร์กรวมตัวกันเกิดเป็นโปรตอนและนิวตรอน ซึ่งเป็นส่วนประกอบสำคัญของอะตอม",
        },
        {
          title: "การเกิดธาตุแรกของเอกภพ",
          img: "../assets/bigbang2.jpg",
          desc: "หลังบิกแบงไม่กี่นาที โปรตอนและนิวตรอนรวมตัวกันเป็นนิวเคลียสของธาตุเบา เช่น ไฮโดรเจน ฮีเลียม และลิเทียมเล็กน้อย กระบวนการนี้เรียกว่า Big Bang Nucleosynthesis",
        },
        {
          title: "การเกิดอะตอม",
          img: "../assets/bigbang2.jpg",
          desc: "เมื่อเวลาผ่านไปประมาณ 380,000 ปี เอกภพเย็นลงมากพอให้อิเล็กตรอนจับกับนิวเคลียส กลายเป็นอะตอมแรก ส่วนใหญ่คือไฮโดรเจนและฮีเลียม แสงจึงสามารถเดินทางได้อย่างอิสระเป็นครั้งแรก",
        },
        {
          title: "รังสีไมโครเวฟพื้นหลัง",
          img: "../assets/bigbang2.jpg",
          desc: "แสงที่หลงเหลือจากช่วงเริ่มต้นของเอกภพยังคงกระจายอยู่ทั่วจักรวาลในปัจจุบัน เรียกว่า รังสีไมโครเวฟพื้นหลังของเอกภพ หรือ Cosmic Microwave Background ซึ่งเป็นหลักฐานสำคัญที่สนับสนุนทฤษฎีบิกแบง",
        },
        {
          title: "การเกิดดาวและกาแล็กซี",
          img: "../assets/bigbang2.jpg",
          desc: "หลังจากเกิดอะตอมจำนวนมาก ก๊าซในเอกภพเริ่มรวมตัวกันด้วยแรงโน้มถ่วง เกิดเป็นกลุ่มเมฆก๊าซขนาดใหญ่ ต่อมากลายเป็นดาวฤกษ์รุ่นแรก และรวมตัวกันเป็นกาแล็กซีจำนวนมหาศาล",
        },
        {
          title: "เอกภพยังขยายตัวอยู่",
          img: "../assets/bigbang2.jpg",
          desc: "นักดาราศาสตร์ค้นพบว่ากาแล็กซีส่วนใหญ่กำลังเคลื่อนที่ห่างออกจากกัน แสดงว่าเอกภพยังคงขยายตัวอยู่จนถึงปัจจุบัน ยิ่งอยู่ไกลมากเท่าไร ก็ยิ่งเคลื่อนที่ออกห่างเร็วมากขึ้น",
        },
        {
          title: "ความสำคัญของทฤษฎีบิกแบง",
          img: "../assets/bigbang2.jpg",
          desc: "ทฤษฎีบิกแบงช่วยอธิบายต้นกำเนิดของเอกภพ การเกิดสสาร ดาวฤกษ์ กาแล็กซี และวิวัฒนาการของจักรวาลตลอดเวลาหลายพันล้านปี ถือเป็นพื้นฐานสำคัญของดาราศาสตร์และฟิสิกส์สมัยใหม่",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
