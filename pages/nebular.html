<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - เนบิวลา</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/nebular.png" />
        </div>

        <h1 id="title">เนบิวลาคืออะไร</h1>

        <p id="desc">
          เนบิวลา คือ กลุ่มก๊าซ ฝุ่นละออง และสสารต่าง ๆ ที่กระจายตัวอยู่ในอวกาศ
          มีขนาดใหญ่มากและมีรูปร่างหลากหลาย บางแห่งเป็นแหล่งกำเนิดดาวฤกษ์ใหม่
          ขณะที่บางแห่งเป็นซากที่เหลือจากการสิ้นสุดชีวิตของดาวฤกษ์
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "เนบิวลาคืออะไร",
          img: "../assets/nebular.png",
          desc: "เนบิวลา คือ กลุ่มก๊าซ ฝุ่นละออง และสสารต่าง ๆ ที่กระจายตัวอยู่ในอวกาศ มีขนาดใหญ่มากและมีรูปร่างหลากหลาย บางแห่งเป็นแหล่งกำเนิดดาวฤกษ์ใหม่ ขณะที่บางแห่งเป็นซากที่เหลือจากการสิ้นสุดชีวิตของดาวฤกษ์",
        },
        {
          title: "องค์ประกอบของเนบิวลา",
          img: "../assets/nebular.png",
          desc: "เนบิวลาส่วนใหญ่ประกอบด้วยก๊าซไฮโดรเจนและฮีเลียม ซึ่งเป็นธาตุหลักในเอกภพ รวมถึงฝุ่นอวกาศที่ประกอบด้วยธาตุต่าง ๆ เช่น คาร์บอน ซิลิกอน และเหล็ก สสารเหล่านี้เป็นวัตถุดิบสำคัญในการก่อกำเนิดดาวและระบบดาวเคราะห์",
        },
        {
          title: "การเกิดเนบิวลา",
          img: "../assets/nebular.png",
          desc: "เนบิวลาสามารถเกิดได้หลายรูปแบบ เช่น การรวมตัวของก๊าซและฝุ่นในอวกาศ หรือเกิดจากการระเบิดของดาวฤกษ์มวลมากเมื่อสิ้นอายุขัย ทำให้สสารกระจายออกไปเป็นกลุ่มเมฆขนาดใหญ่",
        },
        {
          title: "เนบิวลากับการเกิดดาวฤกษ์",
          img: "../assets/nebular.png",
          desc: "ภายในเนบิวลาบางแห่ง สสารจะรวมตัวกันด้วยแรงโน้มถ่วงจนหนาแน่นมากขึ้น เมื่ออุณหภูมิและความดันสูงพอ จะเกิดเป็นดาวฤกษ์ดวงใหม่ จึงกล่าวได้ว่าเนบิวลาเป็นแหล่งกำเนิดดาวฤกษ์จำนวนมาก",
        },
        {
          title: "ประเภทของเนบิวลา",
          img: "../assets/nebular.png",
          desc: "นักดาราศาสตร์แบ่งเนบิวลาออกเป็นหลายประเภท เช่น เนบิวลาสะท้อนแสง เนบิวลาปล่อยแสง เนบิวลามืด และเนบิวลาดาวเคราะห์ แต่ละประเภทมีลักษณะการมองเห็นและกระบวนการเกิดแตกต่างกัน",
        },
        {
          title: "เนบิวลาสะท้อนแสง",
          img: "../assets/nebular2.png",
          desc: "เนบิวลาสะท้อนแสงไม่สามารถเปล่งแสงเองได้ แต่จะสะท้อนแสงจากดาวฤกษ์ใกล้เคียง จึงมักมองเห็นเป็นสีฟ้าหรือสีขาวสว่างในภาพถ่ายทางดาราศาสตร์",
        },
        {
          title: "เนบิวลาปล่อยแสง",
          img: "../assets/nebular3.png",
          desc: "เนบิวลาประเภทนี้ได้รับพลังงานจากดาวฤกษ์ร้อนใกล้เคียง ทำให้ก๊าซภายในเรืองแสงออกมาเอง มักเห็นเป็นสีแดง ชมพู หรือม่วง และมักเป็นบริเวณที่มีการเกิดดาวฤกษ์ใหม่",
        },
        {
          title: "เนบิวลามืด",
          img: "../assets/nebular4.png",
          desc: "เนบิวลามืดเป็นกลุ่มฝุ่นหนาแน่นที่บดบังแสงจากดาวหรือเนบิวลาที่อยู่ด้านหลัง จึงมองเห็นเป็นเงาดำบนท้องฟ้า แม้มองไม่สว่าง แต่เป็นบริเวณสำคัญของการก่อตัวดาวฤกษ์",
        },
        {
          title: "เนบิวลาดาวเคราะห์",
          img: "../assets/nebular5.png",
          desc: "เนบิวลาดาวเคราะห์เกิดจากดาวฤกษ์มวลปานกลางปล่อยชั้นก๊าซภายนอกออกเมื่อใกล้สิ้นอายุขัย เหลือแกนกลางร้อนอยู่ตรงกลาง ชื่อดาวเคราะห์เป็นเพียงชื่อเรียกจากรูปลักษณ์ ไม่ได้เกี่ยวกับดาวเคราะห์จริง",
        },
        {
          title: "ความสำคัญของเนบิวลา",
          img: "../assets/nebular.png",
          desc: "การศึกษาเนบิวลาช่วยให้มนุษย์เข้าใจกระบวนการเกิดดาวฤกษ์ วงจรชีวิตของดาว การกระจายตัวของธาตุในเอกภพ และต้นกำเนิดของระบบดาวต่าง ๆ รวมถึงระบบสุริยะของเรา",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
