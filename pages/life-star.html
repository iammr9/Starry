<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - วงจรชีวิตดาวฤกษ์</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/starlife.png" />
        </div>

        <h1 id="title">วงจรชีวิตดาวฤกษ์คืออะไร</h1>

        <p id="desc">
          ดาวฤกษ์ทุกดวงมีการเกิด เปลี่ยนแปลง และสิ้นสุดลงเหมือนสิ่งต่าง ๆ
          ในธรรมชาติ ช่วงชีวิตของดาวฤกษ์เรียกว่า วงจรชีวิตดาวฤกษ์
          ซึ่งระยะเวลาและจุดจบของดาวแต่ละดวงแตกต่างกันตามมวลตั้งต้น
          ดาวมวลมากจะใช้พลังงานเร็วและมีอายุสั้น
          ส่วนดาวมวลน้อยจะมีอายุยาวนานกว่า
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "วงจรชีวิตดาวฤกษ์คืออะไร",
          img: "../assets/starlife.png",
          desc: "ดาวฤกษ์ทุกดวงมีการเกิด เปลี่ยนแปลง และสิ้นสุดลงเหมือนสิ่งต่าง ๆ ในธรรมชาติ ช่วงชีวิตของดาวฤกษ์เรียกว่า วงจรชีวิตดาวฤกษ์ ซึ่งระยะเวลาและจุดจบของดาวแต่ละดวงแตกต่างกันตามมวลตั้งต้น ดาวมวลมากจะใช้พลังงานเร็วและมีอายุสั้น ส่วนดาวมวลน้อยจะมีอายุยาวนานกว่า",
        },
        {
          title: "ระยะเริ่มต้น เนบิวลา",
          img: "../assets/nebular.png",
          desc: "จุดเริ่มต้นของดาวฤกษ์คือเนบิวลา ซึ่งเป็นกลุ่มก๊าซและฝุ่นขนาดใหญ่ในอวกาศ เมื่อสสารภายในเนบิวลาถูกรบกวนหรือรวมตัวกันด้วยแรงโน้มถ่วง จะเริ่มยุบตัวเข้าสู่ศูนย์กลางและกลายเป็นต้นกำเนิดของดาวดวงใหม่",
        },
        {
          title: "โปรโตสตาร์",
          img: "../assets/protostar.png",
          desc: "เมื่อก๊าซและฝุ่นยุบตัวมากขึ้น จะเกิดเป็นโปรโตสตาร์ หรือดาวก่อนกำเนิด อุณหภูมิภายในเพิ่มสูงขึ้นอย่างต่อเนื่อง แต่ยังไม่เกิดปฏิกิริยานิวเคลียร์เต็มรูปแบบ ระยะนี้ดาวยังคงสะสมมวลจากสสารรอบตัว",
        },
        {
          title: "ดาวฤกษ์ลำดับหลัก",
          img: "../assets/sun.png",
          desc: "เมื่อแกนกลางร้อนและหนาแน่นมากพอ ไฮโดรเจนจะหลอมรวมเป็นฮีเลียม เกิดพลังงานมหาศาล ดาวจะเข้าสู่ระยะดาวฤกษ์ลำดับหลัก ซึ่งเป็นช่วงที่เสถียรที่สุดและยาวนานที่สุด ดวงอาทิตย์ของเราอยู่ในระยะนี้",
        },
        {
          title: "เส้นทางของดาวมวลน้อย",
          img: "../assets/sun.png",
          desc: "ดาวที่มีมวลใกล้เคียงดวงอาทิตย์ เมื่อเชื้อเพลิงไฮโดรเจนเริ่มหมด แกนกลางจะยุบตัว แต่ชั้นนอกขยายใหญ่ กลายเป็นดาวยักษ์แดง หลังจากนั้นชั้นนอกจะหลุดออกไปเป็นเนบิวลาดาวเคราะห์ เหลือแกนกลางร้อนขนาดเล็กเรียกว่า ดาวแคระขาว",
        },
        {
          title: "ดาวแคระขาว",
          img: "../assets/whitedwarf.png",
          desc: "ดาวแคระขาวเป็นซากดาวฤกษ์ที่มีขนาดเล็ก แต่หนาแน่นสูงมาก ไม่มีการสร้างพลังงานใหม่แล้ว จะค่อย ๆ เย็นลงเป็นเวลานานมาก หากเวลาผ่านไปนานมากอาจกลายเป็นดาวแคระดำ",
        },
        {
          title: "เส้นทางของดาวมวลมาก",
          img: "../assets/redgiant.png",
          desc: "ดาวฤกษ์ที่มีมวลมากกว่าดวงอาทิตย์หลายเท่า จะใช้เชื้อเพลิงเร็วกว่าและมีอายุสั้นกว่า เมื่อใกล้หมดเชื้อเพลิงจะขยายตัวเป็นดาวมหายักษ์แดง และเกิดการสร้างธาตุหนักภายในแกนกลาง",
        },
        {
          title: "การระเบิดซูเปอร์โนวา",
          img: "../assets/supernova.png",
          desc: "เมื่อแกนกลางของดาวมวลมากไม่สามารถต้านแรงโน้มถ่วงได้ ดาวจะยุบตัวอย่างรวดเร็วและระเบิดอย่างรุนแรง เรียกว่า ซูเปอร์โนวา การระเบิดนี้ปล่อยพลังงานมหาศาลและกระจายธาตุต่าง ๆ ออกสู่อวกาศ",
        },
        {
          title: "ดาวนิวตรอนและหลุมดำ",
          img: "../assets/nuetronblackhole.png",
          desc: "หลังการระเบิดซูเปอร์โนวา หากแกนกลางที่เหลือมีมวลปานกลาง จะกลายเป็นดาวนิวตรอน แต่ถ้ามีมวลสูงมาก แรงโน้มถ่วงจะยุบตัวต่อเนื่องจนกลายเป็นหลุมดำ ซึ่งแม้แต่แสงก็ไม่สามารถหนีออกมาได้",
        },
        {
          title: "ความสำคัญของวงจรชีวิตดาวฤกษ์",
          img: "../assets/starlife.png",
          desc: "การศึกษาวงจรชีวิตดาวฤกษ์ช่วยให้มนุษย์เข้าใจการกำเนิดธาตุต่าง ๆ ในเอกภพ เพราะธาตุหลายชนิด เช่น คาร์บอน ออกซิเจน เหล็ก เกิดขึ้นภายในดาวฤกษ์และกระจายออกมาเมื่อดาวสิ้นอายุขัย สิ่งมีชีวิตบนโลกจึงมีต้นกำเนิดเชื่อมโยงกับดาวฤกษ์",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
