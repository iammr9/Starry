<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarZ - ดาวเคราะห์</title>

<style>
*{box-sizing:border-box}
html,body{height:100%}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
color:#e8ecff;
background:
radial-gradient(1200px 800px at 80% -10%, #1a1f5a 0%, transparent 60%),
radial-gradient(1000px 700px at -10% 110%, #0a3b2f 0%, transparent 60%),
#050814;
overflow:hidden;
}

body::after{
content:"";
position:fixed;
inset:0;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.35;
pointer-events:none;
z-index:0;
}

/* navbar */
.top-right{
position:absolute;
top:18px;
right:24px;
display:flex;
gap:10px;
z-index:10;
}

.nav-top{
text-decoration:none;
color:#fff;
padding:10px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);
font-size:15px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
min-width:95px;
height:46px;
transition:.2s;
}

.nav-top:hover{
transform:translateY(-2px);
}

.nav-top.active{
background:#5e72eb;
}

/* content */
.wrap{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:24px;
}

.progress{
position:absolute;
top:22px;
left:24px;
opacity:.75;
font-size:15px;
}

.image-box{
height:280px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:18px;
}

.image-box img{
max-height:100%;
max-width:100%;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h1{
font-size:32px;
margin:0 0 12px;
}

p{
font-size:16px;
line-height:1.7;
opacity:.95;
max-width:760px;
margin:auto;
}

.nav{
margin-top:20px;
display:flex;
gap:12px;
}

.nav button{
padding:12px 18px;
border:none;
border-radius:14px;
cursor:pointer;
color:#fff;
background:#5e72eb;
font-size:16px;
transition:.2s;
}

.nav button:hover{
transform:translateY(-2px);
}

@media(max-width:768px){
h1{font-size:28px}
p{font-size:16px}
.image-box{height:200px}
}
</style>
</head>

<body>

<div class="progress" id="progress">1 / 4</div>

<div class="top-right">
<a href="../course.html" class="nav-top active">Course</a>
<a href="../quiz.html" class="nav-top">Quiz</a>
</div>

<section class="wrap">

<div class="card" id="card">

<div class="image-box">
<img id="img" src="assets/space1.png">
</div>

<h1 id="title">ดาวเคราะห์คืออะไร</h1>

<p id="desc">
ดาวเคราะห์ คือ วัตถุท้องฟ้าที่โคจรรอบดวงอาทิตย์ มีมวลมากพอให้รูปร่างเกือบเป็นทรงกลม และไม่มีแสงสว่างในตัวเอง แสงที่มองเห็นเกิดจากการสะท้อนแสงจากดวงอาทิตย์ ดาวเคราะห์เป็นสมาชิกสำคัญของระบบสุริยะ และแต่ละดวงมีลักษณะแตกต่างกันมาก
</p>

</div>

<div class="nav">
<button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
<button onclick="nextSlide()">ถัดไป ➡️</button>
</div>

</section>

<script>
const slides = [
{
title:"ดาวเคราะห์คืออะไร",
img:"assets/planet1.png",
desc:"ดาวเคราะห์ คือ วัตถุท้องฟ้าที่โคจรรอบดวงอาทิตย์ มีมวลมากพอให้รูปร่างเกือบเป็นทรงกลม และไม่มีแสงสว่างในตัวเอง แสงที่มองเห็นเกิดจากการสะท้อนแสงจากดวงอาทิตย์ ดาวเคราะห์เป็นสมาชิกสำคัญของระบบสุริยะ และแต่ละดวงมีลักษณะแตกต่างกันมาก"
},
{
title:"ดาวเคราะห์ในระบบสุริยะ",
img:"assets/planet2.png",
desc:"ปัจจุบันระบบสุริยะมีดาวเคราะห์ที่ได้รับการยอมรับจำนวน 8 ดวง ได้แก่ ดาวพุธ ดาวศุกร์ โลก ดาวอังคาร ดาวพฤหัสบดี ดาวเสาร์ ดาวยูเรนัส และดาวเนปจูน โดยเรียงตามระยะห่างจากดวงอาทิตย์จากใกล้ไปไกล"
},
{
title:"ดาวเคราะห์ชั้นใน",
img:"assets/planet3.png",
desc:"ดาวเคราะห์ชั้นใน ได้แก่ ดาวพุธ ดาวศุกร์ โลก และดาวอังคาร เป็นดาวเคราะห์หิน มีพื้นผิวแข็ง ขนาดค่อนข้างเล็ก และอยู่ใกล้ดวงอาทิตย์มากกว่าดาวเคราะห์กลุ่มอื่น ระหว่างดาวอังคารกับดาวพฤหัสบดีมีแถบดาวเคราะห์น้อยคั่นอยู่"
},
{
title:"ดาวเคราะห์ชั้นนอก",
img:"assets/planet4.png",
desc:"ดาวเคราะห์ชั้นนอก ได้แก่ ดาวพฤหัสบดี ดาวเสาร์ ดาวยูเรนัส และดาวเนปจูน มีขนาดใหญ่กว่าดาวเคราะห์ชั้นในมาก ส่วนใหญ่ประกอบด้วยก๊าซและน้ำแข็ง มีวงแหวนและมีดวงจันทร์บริวารจำนวนมาก"
},
{
title:"การโคจรของดาวเคราะห์",
img:"assets/planet5.png",
desc:"ดาวเคราะห์ทุกดวงโคจรรอบดวงอาทิตย์เป็นวงรี และหมุนรอบแกนของตนเอง ทำให้เกิดกลางวันกลางคืน ระยะเวลาการโคจรของแต่ละดวงไม่เท่ากัน โดยดาวที่อยู่ไกลดวงอาทิตย์จะใช้เวลานานกว่าดาวที่อยู่ใกล้"
},
{
title:"โลก ดาวเคราะห์ที่เอื้อต่อชีวิต",
img:"assets/planet6.png",
desc:"โลกเป็นดาวเคราะห์ที่มีสภาพแวดล้อมเหมาะสมต่อการดำรงชีวิต มีน้ำในสถานะของเหลว มีบรรยากาศที่ช่วยป้องกันรังสีอันตราย และมีอุณหภูมิที่เหมาะสม จึงเป็นดาวเคราะห์ดวงเดียวที่ทราบแน่ชัดว่ามีสิ่งมีชีวิต"
},
{
title:"ดาวเคราะห์กับการสำรวจอวกาศ",
img:"assets/planet7.png",
desc:"มนุษย์ได้ส่งยานสำรวจไปศึกษาดาวเคราะห์หลายดวง เช่น ดาวอังคาร ดาวพฤหัสบดี และดาวเสาร์ เพื่อศึกษาสภาพพื้นผิว บรรยากาศ ดวงจันทร์บริวาร และค้นหาความเป็นไปได้ของสิ่งมีชีวิตนอกโลก"
},
{
title:"ความสำคัญของการศึกษาดาวเคราะห์",
img:"assets/planet8.png",
desc:"การศึกษาดาวเคราะห์ช่วยให้เข้าใจการกำเนิดระบบสุริยะ การเปลี่ยนแปลงของดาวแต่ละดวง และช่วยเปรียบเทียบโลกกับดาวอื่น ๆ เพื่อนำความรู้ไปใช้ในการสำรวจอวกาศและการพัฒนาวิทยาศาสตร์ในอนาคต"
}
];

let index = 0;

function render(){
document.getElementById("title").innerText = slides[index].title;
document.getElementById("desc").innerText = slides[index].desc;
document.getElementById("img").src = slides[index].img;
document.getElementById("progress").innerText = (index+1) + " / " + slides.length;

const nextBtn = document.querySelectorAll(".nav button")[1];

if(index === slides.length - 1){
nextBtn.innerText = "กลับหน้า Course";
}else{
nextBtn.innerText = "ถัดไป ➡️";
}
}

function nextSlide(){
if(index < slides.length - 1){
index++;
render();
}else{
window.location.href = "../course.html";
}
}

function prevSlide(){
if(index > 0){
index--;
render();
}
}

render();
</script>

</body>
</html>
