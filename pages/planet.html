<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - ดาวเคราะห์</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/planet.png" />
        </div>

        <h1 id="title">ดาวเคราะห์คืออะไร</h1>

        <p id="desc">
          ดาวเคราะห์ คือ วัตถุท้องฟ้าที่โคจรรอบดวงอาทิตย์
          มีมวลมากพอให้รูปร่างเกือบเป็นทรงกลม และไม่มีแสงสว่างในตัวเอง
          แสงที่มองเห็นเกิดจากการสะท้อนแสงจากดวงอาทิตย์
          ดาวเคราะห์เป็นสมาชิกสำคัญของระบบสุริยะ
          และแต่ละดวงมีลักษณะแตกต่างกันมาก
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "ดาวเคราะห์คืออะไร",
          img: "../assets/planet.png",
          desc: "ดาวเคราะห์ คือ วัตถุท้องฟ้าที่โคจรรอบดวงอาทิตย์ มีมวลมากพอให้รูปร่างเกือบเป็นทรงกลม และไม่มีแสงสว่างในตัวเอง แสงที่มองเห็นเกิดจากการสะท้อนแสงจากดวงอาทิตย์ ดาวเคราะห์เป็นสมาชิกสำคัญของระบบสุริยะ และแต่ละดวงมีลักษณะแตกต่างกันมาก",
        },
        {
          title: "ดาวเคราะห์ในระบบสุริยะ",
          img: "../assets/planet.png",
          desc: "ปัจจุบันระบบสุริยะมีดาวเคราะห์ที่ได้รับการยอมรับจำนวน 8 ดวง ได้แก่ ดาวพุธ ดาวศุกร์ โลก ดาวอังคาร ดาวพฤหัสบดี ดาวเสาร์ ดาวยูเรนัส และดาวเนปจูน โดยเรียงตามระยะห่างจากดวงอาทิตย์จากใกล้ไปไกล",
        },
        {
          title: "ดาวเคราะห์ชั้นใน",
          img: "../assets/planet.png",
          desc: "ดาวเคราะห์ชั้นใน ได้แก่ ดาวพุธ ดาวศุกร์ โลก และดาวอังคาร เป็นดาวเคราะห์หิน มีพื้นผิวแข็ง ขนาดค่อนข้างเล็ก และอยู่ใกล้ดวงอาทิตย์มากกว่าดาวเคราะห์กลุ่มอื่น ระหว่างดาวอังคารกับดาวพฤหัสบดีมีแถบดาวเคราะห์น้อยคั่นอยู่",
        },
        {
          title: "ดาวเคราะห์ชั้นนอก",
          img: "../assets/planet.png",
          desc: "ดาวเคราะห์ชั้นนอก ได้แก่ ดาวพฤหัสบดี ดาวเสาร์ ดาวยูเรนัส และดาวเนปจูน มีขนาดใหญ่กว่าดาวเคราะห์ชั้นในมาก ส่วนใหญ่ประกอบด้วยก๊าซและน้ำแข็ง มีวงแหวนและมีดวงจันทร์บริวารจำนวนมาก",
        },
        {
          title: "การโคจรของดาวเคราะห์",
          img: "../assets/planet.png",
          desc: "ดาวเคราะห์ทุกดวงโคจรรอบดวงอาทิตย์เป็นวงรี และหมุนรอบแกนของตนเอง ทำให้เกิดกลางวันกลางคืน ระยะเวลาการโคจรของแต่ละดวงไม่เท่ากัน โดยดาวที่อยู่ไกลดวงอาทิตย์จะใช้เวลานานกว่าดาวที่อยู่ใกล้",
        },
        {
          title: "โลก ดาวเคราะห์ที่เอื้อต่อชีวิต",
          img: "../assets/planet.png",
          desc: "โลกเป็นดาวเคราะห์ที่มีสภาพแวดล้อมเหมาะสมต่อการดำรงชีวิต มีน้ำในสถานะของเหลว มีบรรยากาศที่ช่วยป้องกันรังสีอันตราย และมีอุณหภูมิที่เหมาะสม จึงเป็นดาวเคราะห์ดวงเดียวที่ทราบแน่ชัดว่ามีสิ่งมีชีวิต",
        },
        {
          title: "ดาวเคราะห์กับการสำรวจอวกาศ",
          img: "../assets/planet.png",
          desc: "มนุษย์ได้ส่งยานสำรวจไปศึกษาดาวเคราะห์หลายดวง เช่น ดาวอังคาร ดาวพฤหัสบดี และดาวเสาร์ เพื่อศึกษาสภาพพื้นผิว บรรยากาศ ดวงจันทร์บริวาร และค้นหาความเป็นไปได้ของสิ่งมีชีวิตนอกโลก",
        },
        {
          title: "ความสำคัญของการศึกษาดาวเคราะห์",
          img: "../assets/planet.png",
          desc: "การศึกษาดาวเคราะห์ช่วยให้เข้าใจการกำเนิดระบบสุริยะ การเปลี่ยนแปลงของดาวแต่ละดวง และช่วยเปรียบเทียบโลกกับดาวอื่น ๆ เพื่อนำความรู้ไปใช้ในการสำรวจอวกาศและการพัฒนาวิทยาศาสตร์ในอนาคต",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
