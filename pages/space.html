<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry - อวกาศ</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../lesson.css" />
  </head>

  <body>
    <div class="progress" id="progress">1 / 4</div>

    <div class="top-right">
      <a href="../course.html" class="nav-top active">Course</a>
      <a href="../quiz.html" class="nav-top">Quiz</a>
    </div>

    <section class="wrap">
      <div class="lesson-card" id="card">
        <div class="image-box">
          <img id="img" src="../assets/space1.png" />
        </div>

        <h1 id="title">อวกาศคืออะไร</h1>

        <p id="desc">
          อวกาศ คือ บริเวณที่อยู่นอกชั้นบรรยากาศของโลก
          เป็นพื้นที่กว้างใหญ่ที่มีดาวเคราะห์ ดาวฤกษ์ กาแล็กซี และวัตถุต่าง ๆ
          อยู่มากมาย
        </p>
      </div>

      <div class="nav">
        <button onclick="prevSlide()">⬅️ ก่อนหน้า</button>
        <button onclick="nextSlide()">ถัดไป ➡️</button>
      </div>
    </section>

    <script>
      const slides = [
        {
          title: "อวกาศคืออะไร",
          img: "../assets/space1.png",
          desc: "อวกาศ คือ บริเวณที่อยู่นอกชั้นบรรยากาศของโลก เป็นพื้นที่กว้างใหญ่ที่มีดาวเคราะห์ ดาวฤกษ์ กาแล็กซี และวัตถุต่าง ๆ อยู่มากมาย",
        },
        {
          title: "ลักษณะของอวกาศ",
          img: "../assets/space2.png",
          desc: "อวกาศมีสภาพเป็นสุญญากาศ ความดันต่ำมาก แทบไม่มีอากาศ จึงไม่สามารถหายใจได้ และเสียงไม่สามารถเดินทางผ่านอวกาศได้",
        },
        {
          title: "อุณหภูมิในอวกาศ",
          img: "../assets/space3.png",
          desc: "อวกาศมีอุณหภูมิเปลี่ยนแปลงมาก หากอยู่ในแสงอาทิตย์จะร้อนจัด แต่บริเวณที่ไม่มีแสงจะหนาวจัด",
        },
        {
          title: "ความสำคัญของอวกาศ",
          img: "../assets/space4.png",
          desc: "อวกาศมีความสำคัญต่อการศึกษาโลก การสื่อสารผ่านดาวเทียม การพยากรณ์อากาศ และช่วยให้มนุษย์เข้าใจจักรวาลมากขึ้น",
        },
      ];

      let index = 0;

      function render() {
        document.getElementById("title").innerText = slides[index].title;
        document.getElementById("desc").innerText = slides[index].desc;
        document.getElementById("img").src = slides[index].img;
        document.getElementById("progress").innerText =
          index + 1 + " / " + slides.length;

        const nextBtn = document.querySelectorAll(".nav button")[1];

        if (index === slides.length - 1) {
          nextBtn.innerText = "กลับหน้า Course";
        } else {
          nextBtn.innerText = "ถัดไป ➡️";
        }
      }

      function nextSlide() {
        if (index < slides.length - 1) {
          index++;
          render();
        } else {
          window.location.href = "../course.html";
        }
      }

      function prevSlide() {
        if (index > 0) {
          index--;
          render();
        }
      }

      render();
    </script>
  </body>
</html>
