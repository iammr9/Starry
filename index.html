<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry</title>
    <!-- CSS -->
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        position: relative;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Ubuntu,
          sans-serif;
        color: #e8ecff;
        background:
          radial-gradient(
            1200px 800px at 80% -10%,
            #1a1f5a 0%,
            transparent 60%
          ),
          radial-gradient(
            1000px 700px at -10% 110%,
            #0a3b2f 0%,
            transparent 60%
          ),
          #050814;
        overflow: hidden;
        padding: 20px;
      }

      body::after {
        content: "";
        position: absolute;
        inset: 0;
        min-height: 100%;
        background: url("https://www.transparenttextures.com/patterns/stardust.png");
        opacity: 0.3;
        pointer-events: none;
        z-index: 0;
      }

      .box {
        text-align: center;
        z-index: 1;
        padding: 30px;
        max-width: 700px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: auto;
      }

      .logo {
        font-size: 56px;
        margin-bottom: 10px;
      }

      .desc {
        font-size: 18px;
        opacity: 0.9;
        line-height: 1.7;
        margin-bottom: 25px;
      }

      .btn {
        display: inline-block;
        padding: 14px 28px;
        background: #6b7cff;
        color: #fff;
        text-decoration: none;
        border-radius: 14px;
        font-size: 18px;
        transition: 0.2s;
      }

      .btn:hover {
        transform: translateY(-3px) scale(1.03);
      }

      @media (max-width: 768px) {
        body {
          padding: 14px;
          overflow: auto;
        }

        .wrap {
          padding: 16px;
          justify-content: flex-start;
          padding-top: 90px;
        }

        .top-right {
          top: 14px;
          right: 14px;
          gap: 8px;
        }

        .nav-top {
          min-width: 78px;
          height: 40px;
          font-size: 14px;
          padding: 8px 12px;
        }

        .progress {
          top: 18px;
          left: 14px;
          font-size: 14px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 15px;
          line-height: 1.6;
        }

        .image-box {
          height: 180px;
        }

        .nav {
          width: 100%;
          flex-direction: column;
        }

        .nav button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1 class="logo">✦Starry✦</h1>

      <p class="desc">
        เว็บไซต์เรียนรู้ดาราศาสตร์แบบ Interactive<br />
        สำรวจจักรวาลผ่านบทเรียนและแบบทดสอบ
      </p>

      <a href="course.html" class="btn">Let's Start 🚀</a>
    </div>
  </body>
</html>
