<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarZ</title>

<style>
*{box-sizing:border-box}
html,body{height:100%}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
color:#e8ecff;
background:
radial-gradient(1200px 800px at 80% -10%, #1a1f5a 0%, transparent 60%),
radial-gradient(1000px 700px at -10% 110%, #0a3b2f 0%, transparent 60%),
#050814;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.3;
pointer-events:none;
}

.box{
text-align:center;
z-index:1;
padding:30px;
max-width:700px;
}

.logo{
font-size:56px;
margin-bottom:10px;
}

.desc{
font-size:18px;
opacity:.9;
line-height:1.7;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#6b7cff;
color:#fff;
text-decoration:none;
border-radius:14px;
font-size:18px;
transition:.2s;
}

.btn:hover{
transform:translateY(-3px) scale(1.03);
}
</style>
</head>

<body>

<div class="box">
<h1 class="logo">✨ StarZ ✨</h1>

<p class="desc">
เว็บไซต์เรียนรู้ดาราศาสตร์แบบ Interactive<br>
สำรวจจักรวาลผ่านบทเรียนและแบบทดสอบ
</p>

<a href="course.html" class="btn">Let's Start 🚀</a>
</div>

</body>
</html>
