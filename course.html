<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Starry Course</title>

    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        position: relative;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Ubuntu,
          sans-serif;
        color: #e8ecff;
        background:
          radial-gradient(
            1200px 800px at 80% -10%,
            #1a1f5a 0%,
            transparent 60%
          ),
          radial-gradient(
            1000px 700px at -10% 110%,
            #0a3b2f 0%,
            transparent 60%
          ),
          #050814;
        overflow: hidden;
      }

      body::after {
        content: "";
        position: absolute;
        inset: 0;
        min-height: 100%;
        background: url("https://www.transparenttextures.com/patterns/stardust.png");
        opacity: 0.3;
        pointer-events: none;
        z-index: 0;
      }

      .view {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
        gap: 16px;
        position: relative;
      }

      .logo {
        font-size: 40px;
      }
      .subtitle {
        opacity: 0.8;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: min(900px, 95%);
        z-index: 1;
      }

      .menu-btn {
        min-height: 75px;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.02)
        );
        color: #fff;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .menu-btn:hover {
        transform: translateY(-3px) scale(1.02);
      }

      .top-right {
        position: absolute;
        top: 18px;
        right: 24px;
        display: flex;
        gap: 10px;
        z-index: 10;
      }

      .nav-top {
        text-decoration: none;
        color: #fff;
        padding: 10px 18px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.02)
        );
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 95px;
        height: 46px;
        transition: 0.2s;
      }

      .nav-top:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .nav-top.active {
        background: #5e72eb;
      }

      .footer {
        position: absolute;
        bottom: 16px;
        opacity: 0.5;
        font-size: 12px;
      }

      @media (max-width: 768px) {
        .menu-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .brand {
        position: absolute;
        top: 18px;
        left: 24px;
        z-index: 10;
        text-decoration: none;
        color: #fff;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
        transition: 0.2s;
      }

      .brand:hover {
        transform: translateY(-2px);
        opacity: 0.9;
      }

      @media (max-width: 768px) {
        body {
          overflow: auto;
          padding: 12px;
        }

        .view {
          justify-content: flex-start;
          padding: 12px;
          gap: 12px;
        }

        .brand {
          position: static;
          display: block;
          text-align: left;
          font-size: 44px;
          margin: 0 0 14px;
          width: 100%;
        }

        .top-right {
          position: static;
          display: flex;
          gap: 12px;
          width: 100%;
          margin-bottom: 16px;
        }

        .nav-top {
          flex: 1;
          text-align: center;
        }

        .subtitle {
          font-size: 16px;
          text-align: center;
          margin-bottom: 12px;
        }

        .menu-grid {
          grid-template-columns: 1fr;
          width: 100%;
          gap: 12px;
        }

        .menu-btn {
          min-height: 72px;
          font-size: 24px;
          padding: 14px;
        }

        .footer {
          position: static;
          margin-top: 18px;
          font-size: 12px;
          text-align: center;
        }
      }
    </style>
  </head>
